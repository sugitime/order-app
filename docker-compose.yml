services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: order_app
      POSTGRES_PASSWORD: order_app
      POSTGRES_DB: order_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_app -d order_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://order_app:order_app@db:5432/order_app?schema=public
      AUTH_SECRET: local-docker-dev-secret-change-me
      APP_URL: http://localhost:3000
      SEED_ADMIN_EMAIL: kevin@sugiti.me
      SEED_ADMIN_PASSWORD: changeme123
      RUN_SEED: "true"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: