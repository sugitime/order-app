databases:
  - name: order-app-db
    plan: free
    databaseName: order_app
    user: order_app

services:
  - type: web
    name: order-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /order
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: order-app-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: RUN_SEED
        value: "true"
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false