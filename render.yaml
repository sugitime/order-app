databases:
  - name: order-app-db
    plan: free
    databaseName: order_app
    user: order_app

services:
  - type: web
    name: order-app
    runtime: docker
    # Paid plan required for outbound SMTP (ports 25, 465, 587). Starter ($7/mo) is enough.
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /order
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: order-app-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: RUN_SEED
        value: "false"
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false